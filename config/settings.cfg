[sensor]
trig_pin         = 17
echo_pin         = 27
float_pin        = 24
threshold_high   = 90
threshold_low    = 20
poll_interval_ms = 500

[actuator]
pump_pin         = 22
valve_pin        = 23
pump_on_delay    = 200

[logging]
enable           = true
log_file         = /var/log/smartflow/fill_log.csv
log_interval_s   = 5
